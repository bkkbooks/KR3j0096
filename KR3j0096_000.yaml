body:
  text: 朝氏客語雜家類三雜說之屬提要臣等謹案朝氏客語一卷宋朝說之撰說之有儒言已著録是書乃其劄記雜論兼及朝野見聞蓋亦語録之流條下間有夾注如云右五段張某又云第四段劉快活又有李及夀朋述志諸名氏蓋用蘇鶚杜陽雜編之例每條各記其所語之人所謂客語也其中議論多有關於立身行己之大端所載熙豐間名流遺事大都得自目擊於史傳亦可互相參證其說或參雜儒禪則自朝迥以來家學相傳其習尚如是所與游之蘇軾黃庭堅等友朋所講其議論亦如是此蜀黨之學所以迥異於洛黨亦無庸執一格相繩惟解經好為異議如以孟子所稱巨擘為即蚓之大者以既入其苙之苙為香白芷云豚之所甘皆有意穿鑿與王氏新經義何異未免為通人之一蔽爾乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1250d248ec7e322507f5e14b9180adc58aeafa8aee3b627baacfb66ff0c743c9
